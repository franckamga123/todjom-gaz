name: todjom_gaz
description: Application de distribution de gaz domestique au Niger.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  provider: ^6.1.1
  dio: ^5.4.0
  flutter_svg: ^2.0.9
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  font_awesome_flutter: ^10.6.0
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  flutter_spinkit: ^5.2.0
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  custom_info_window: ^1.0.1
  flutter_markdown: ^0.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
